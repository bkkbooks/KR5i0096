front:
  text: 警世功過格
  hash: sha256:7b02a7ab36e606cef31c0f51f3bf9aa8e91f5c07d606c9733926681e5cb01cd4
body:
  text: 警世功過格孚佑上帝純陽吕祖天師示定求心篇孚佑上帝曰人之有心如天之有日心之邪正如日之升沈日升沈而晝夜分心邪正而人鬼判故心者萬善之源而百行之所由出也儒曰正心道曰存心釋曰明心心正則不亂心存則不放心明則不蔽三教一理也孟子曰學問之道無他求其放心而已矣今之心若亡羊然盍歸而求之求心之道無他屏諸幻想除諸惡念獨置力於倫常而已蓋屏諸幻想則心存除諸惡念則心明置力於倫常則心正而不亂聖賢仙佛不外是矣至於屏除置力之道則在擇善而固執之耳擇善之道必本倫常然必心中清淨無一毫雜念火氣不生在在歡喜自然心不忘親常存敬愛推之五倫莫不皆準常想聖賢之言濳心理會每聞父師之訓敬凜奉持見聖賢經傳格言爽然於目見父母手澤口澤惕然於衷見人善行聞人善言生企慕心見人惡事聞人惡言生警省心聞淫褻語而不移見好子女而不惑當喜知節當怒知懲念念在兹與人為善與人有怨輒思其好處以釋之中心有憾輒思己過處以寬之人以非禮相加無心報復人以巧機攙奪無心好還靜籌人託以期踐言靜思人恩以圖報稱處繁華中有恬淡心處貧賤中無怨尤心見人失意生悵惘心見人得意生歡喜心見人才高生欽服心見人饑寒生憐憫心見人勤勞生體恤心見人謬誤無非笑心見人珍異無幸得心見人富貴無艷慕心不因勢力而生趨附心不因衰落而生厭薄心不因貧乏而生苟且心不因急迫而生險詐心見老成而生敬見道德而知尊見人愚頑無禮而不怨見人飮啖過節而不憎聞人言語無稽而不厭聞人虛聲恐愒而不驚見人有功恆思所報見人有過恆想其難聞人有善而不疑聞人有惡而莫信引過歸已推善與人受橫不嗔受謗不辨居常省過行則闕疑久久變化氣質歸於純粹方寸之內有如冰雪舉念之間無非忠信上焉可以入道成真而證果下焉亦長保其福祿而蔭及子孫矣苟或祭先不敬事親不誠父師教誨口應心違父母家庭心疑偏愛兄弟叔侄有欲而憎天地鬼神臨財不畏聞善知悅過後即忘起念為善未幾即怠聞人有善心疑不信聞人有惡心信不疑見方正而不恭對老成而多慢心欲勝人時生忿怒心惟利已時生嫉妬學未成而自負事已誤而自寬艱難輒起怨尤富貴便生驕泰心圖人物而口卻支吾心服其人而口偏倔强借財不得遂若仇讐缺債不還反生怨恨才不及其人而故欲傲之識不逮其人而故欲非之心知自錯而怙終心議其非而面諛淫念貪念惡念嫉妬念媚世念輾轉不除忿心躁心傲心不平心陰賊心循環不已所謀未善反恨人之不從作事多乖卻怨人之不用見好子女輒生意惡聞婦人聲便爾心移作計欺公起心害衆常懷陰險自作聰明在在憎嫌時時懊惱凡若此者事雖未彰於言行心先觸怒於鬼神罰在其身毒流孫子嗚呼善惡之分如絲染皂善惡之報如影隨形苟改過以為良亦從凶而反吉倘執迷而不悟終怙禍而遭殃然而善惡心生吉凶心召苟正其心則無適而非善矣苟求其心則無適而非正矣聖賢千言萬語不過於斯靈樞經曰知其要者一言而終不知其要流散無竅所謂要者行住坐卧常想此心在腔子裏自然雜念不生自然舉念皆善天地鬼神交相保護凶妖惡眚無自而干矣例言功格意善計五十六則語善計三十九則行善計七十二則過格意惡計五十九則語惡計五十七則行惡計一百二十一則凡諸過惡而能改行遷善者其功十倍凡欲力行功過格者須將此冊存於案頭另立一簿以計功過每舉一念發一言行一事自揣是善是惡即查冊內功過多少逐日逐款挨登簿內每月結算將功折過功過多餘載入下月毋矜功以自欺毋掩過以自恕初或過多功少繼而功過相等行之既久則舉念皆善雖此格亦無所用之則功成而善根深矣其福報豈可量哉功格意善心中清淨無一毫雜念一日十功心不忘親常存敬愛一日十功常懷與人為善之念一日十功火氣不生在在歡喜一日十功常想聖賢之言濳心理會一日十功起一念如天地鬼神鑒臨其上一事十功聽父母教誨誠心歡喜敬凜奉持一日一事一功變化氣質歸於純粹千功聞淫褻語而不動心五功見好女子而不動心五十功見人善行聞人善言生企慕心一功見人惡行聞人惡言生警省心一功靜思人恩以圖報稱三功靜籌人託以期無負十功當怒知懲十功當喜知節三功處繁華中有恬淡心五功處貧賤中無怨尤心一日一功人以非禮相加無報復心一事十功事大加等人以巧機攙奪無爭執心一事十功事大加等與人有怨輒思其好處以釋之十功心中不平輒思己過處以釋之十功見人失意生悵惘心一功見人得意生歡喜心三功見人才高生欽服心一功見人飢寒生憐憫心一功若能周濟算錢記功見人勤勞生體恤心五功見人謬誤無非笑心一功若能真誠指教十功見人珍異無幸得心一功見人富貴無艷慕心十功不因勢利而生趨附心三十功不因衰落而生厭薄心五十功不因貧乏而生苟且心一日十功不因急迫而生險詐心三十功見老成而生敬三功見道德而知尊五功見人愚頑無禮而不怒三功見人飲噉過節而不憎一功聞人言語無稽而不厭一功見人有功恆思所報五功見人有過恆想其難十功聞人有善而不疑一功聞人有惡而未信五功受橫不嗔十功至五十功受謗不辨十功至五十功引過歸己十功至百功推善與人十功至百功時時警惕如對大賓一日十功行則闕疑五功居能省過五功受一逆耳言五功至五十功人若過譽愈知警省五功人若趨承愈行謙抑五功世態炎涼不以介意一功一日間無疾言遽色一功待僕婦可怒不怒一功語善勸止一切害人之事十功至千功勸化一人成德二百功勸化一人向善常人三十功士人一百功官長五百功勸化一家勤儉百功勸化嫖賭奢淫一人回心百功勸止一人賭五十功勸止一人嫖五十功勸止一人墮胎二百功勸止一人溺女五百功勸一人孝不從十功從者百功改者千功勸一人悌不從十功從者三十功改者百功勸化人倫理親戚間和合百功勸化人夫妻和合百功勸化人弋獵屠釣回心不從一功從者十功改者百功自行弋獵而能改者千功白一人寃五十功至二百功揚一人善一功至五功掩一人惡十功至五十功勸息人訟十功至五十功勸息人爭五功勸息人怒三功以上三事關係彼家倫理骨肉者功倍之見人躁妄勸令柔和不從一功從者十功改者五十功逢人說正心誠意之道一事十功能化一人改行入道者一百功調停內外骨肉和睦五十功發一至德言五功薦引一有德人五十功至百功勸阻為非五功至五十功善言教誨妻妾子弟奴婢一事一日一功人所不知作方便語五功至五十功凡人有問皆以直告不隱不欺一功至五功人問路覔宿不憚細說一功不妄語一日五功能簡默一日三功止人談閨閫名節事三十功見人毁謗聖賢以理勸止十功見播人惡勸而止之三功逢人說果報格言一事一功作勸善格言一句一功教人治家保身一事一功見人驚憂善為勸解一功行善立法倡善濟衆如常平倉育嬰堂養濟院通水道開義館義莊之類利及一人為一功救一無罪人命五百功完一婦女節拒色是也如係處女孀婦尼姑功尤倍若婦人守志我為區畫保全亦是五百功延一人子嗣為年老人娶妻置妾生子之類五百功拾取寶還人五十功至五百功刋施最上善書百功至五百功捐資刷印善書一卷一功救免一軍流重罪三百功免一人賣妻三百功子女二百功禁止淫書小說淫畫春方二百功自作而能自戒者千功成救一人學業德業家業二百功為孤兒娶婦二百功為人立嗣繼絶百功陰厚親心所厚之人百功救免一徒罪百功表揚一人節義百功倡修橋梁險道百功濟一人流離得還鄉土百功平價減糶百錢為一功倡首為一善事如造涼亭渡船施鬻施茶拾字紙放生等十功至百功見人淩虐孤寡竭力保護五十功葬一無主骸骨五十功免一貧人債十功至五十功成一人美事十功至五十功及筓嫁婢五十功救免一人刑杖三十功撫養一病人至愈三十功表揚一人陰德十功至三十功施一葬地二十功以方術活一重病二十功施棺一具二十功不負人託成一有益事十功善遣一僕如彼有偷盜過惡不明斥者是十功掘井十功護持一善人十功施茶施薑湯一日十功施粥一人一功從厚殯葬僕婢十功報一人恩五功至五十功釋一人怨五功至五十功救一人急五功至五十功不乘危急賤買人物五功至五十功待僕婢可責不責又善諭之五功至五十功救一有力於人之物命牛馬犬類五功至五十功親近明師良友一日三功布施孤老殘疾一人三功救一無力於人之畜命猪羊之類三功濟一人饑一功解一人渴一功救一禽魚蟲蟻物命一功衣服器皿借人應急一功任勞一事一功施藥一服一功齊戒志誠一日一功甘淡惜福一日一功施天燈一夕一功施雨具一人一功惜五穀一次一功飯入於穢者十粒一功若水淨食之十粒一功拾字紙一片一功齊僧道乞丐一人一功體恤下人艱苦一事一功買賣從寬一日一功見老幼殘疾疲頑人扶接過險一功修街道一丈一功砌街道一尺一功借人物件珍惜如期而還一功為人保全一物件一功貴重者功加倍録勸善格言果報一條一功途中除瓦礫剪荊棘一次一功埋自死禽獸一功僧道巫祝術士遇事誘人為善一功誘人行孝悌者倍加熱水潑地留心不傷蟲蟻一次一功過格意惡慢天千過欺君千過輕褻祖宗先靈千過心疑父母偏愛而生怨望千過事親勞而怨驕而怠致親怒貽親憂一事五百過故薄親心所厚之人五百過因財産而憎兄弟五百過因爭産而至成訟者千過心懷陰險五百過代主一切害人之事百過至千過起心害衆百過至千過設計欺公五十過至五百過文過怙終十過至百過自作聰明如違衆而行不顧是非之類十過至百過偏執己見不聽人言十過至百過父母教誨口應心違一事五十過祭先不敬五十過事長不讓五十過受恩不思報五十過恩多者倍借財不得遂若仇讐五十過缺債不還因人取討反生怨恨五十過聞善知悅過後即忘五十過起念為善未幾即怠五十過囤米圖高價五十過至五百過臨財思苟得三十過見好子女輒生意戀三十過見人得意即生嫉妬三十過見人失意反生暢快三十過識不逮其人而故欲非之三十過才不及其人而故欲傲之三十過作事乖謬反怨人不用三十過祭神不敬二十過見殺反以為快二十過貧賤怨尤一事十過富貴驕泰一事十過淫念貪念惡念嫉妬念媚世念輾轉不除一日十過忿心躁心傲心不平心陰賊心循環不已一日十過昏惰一日十過聞人有善而不信十過心欲勝人時生嫉妬十過心惟利己時生忿怒十過心圖人物而口支吾一過至十過心慕其人而口倔强一過至十過心議人非而為面諛十過所謀未當恨人不從十過覬圖非分十過嗔一逆耳言十過憎戒行僧道五過遷怒十過聞婦人聲便爾心移三過學不若人不耻不勉一日一過輕忽傲慢一事一過小事忿怒一事一過不干己事動怒一事一過若更不合理者加之己過之事留戀不忘未來之事虛為籌畫一事一過虛願妄想一事一過不恤僕婢役人飢寒勞苦一事一日一過見食粗糲生憎心一過見人鹵莽生厭心一過見人雄餐生惡心一過語惡詆觸父母一言千過倡說叛聖賢千過怨懟言父母過五百過造言謗汚一婦女節五百過倘有失所折離或致死者千過離間人骨肉五百過阻親善唆親惡一事百過發人陰私十過至百過造言誣人十過至百過惡言犯師長叔伯尊親五十過父母祖父母前掩飾虛言一次五十過譏議前賢五十過毁謗神佛五十過呵風罵雨怒寒怒暑五十過察人陰私五過至五十過教人為不善五過至五十過虛誑一事五過至五十過言尊長過三十過謔及閨闈子女三十過戲語謾及聖賢佛仙三十過戲侮經傳以經語資談笑者亦同三十過文過巧飾三十過毁謗行善等書三十過造一人歌謡諢號三十過犯人父兄長上三十過推求人過凡所未必然者三十過非議朝政二十過面責人過使不能容二十過遺落窮親二十過泠語侵人十過非議所居之大夫十過談淫䙝語十過有幼輩在座者加倍以言餂人十過謾語荒唐不循道理十過逆理毁罵自以為直十過言人之過有傷恕道十過遁詞虛僞言不由中十過凡詞務盡刺刺不休十過出損德語一句十過罵人五過惡言挺觸人五過以言報復不能忍耐五過率口亂道五過沒一人善五過播一人惡五過至五十過虛傳一事五過至五十過傳聞未確即行播揚五過惡謔浪語五過酒後大言謾無所畏五過不觀顏色不避忌諱五過背後罵人三過背後批評人一過關人名節者加倍謔謾一語一過欺誑無識一過事大者加戲侮愚懦一過事大者加罵辱乞丐一過老幼婦女殘廢者加倍誇己能一過播揚人閨閫醜事一事一百過行惡違拗祖父母父母一事千過敗一良家婦女節千過墮一良家子弟行千過造淫書艷曲淫畫刊刻刷印者同千過創一事貽害地方千過致一人死千過絶一人嗣千過賣婢作娼千過溺女一次千過致一人軍流罪五百過放火燒人房屋五百過白占人田産五百過用謀圖娶寡婦尼姑為妻妾五百過寵妾棄妻五百過縱子孫為惡五百過不葬親柩五百過掘一人尸五百過圖謀風水侵害他人墳塋五百過侵害自己祖墳千過墮胎一次因邪色者加倍三百過姦淫微賤及原失節婦三百過蓄俊僕艷婢致啓邪淫三百過學蠱毒魘魅房術外道併傳人三百過誘一人嫖三百過誘一人賭三百過傾一人家産三百過破一家風水三百過致一人失所三百過唆一人詞訟三百過因而破家者加倍破一人婚姻三百過誘一人為非三百過排擯一德行人五十過至五百過縱僕為惡三百過致一人賣妻三百過妻虐婢妾不能檢制百過至三百過至死者千過壞一人前程二百過毀壞一人戒行二百過婟婢不嫁二百過故用假銀二百過因假銀致生他變者加倍致一人典賣子女二百過致一人徒罪二百過養子不教二百過陰謀田産一百過開場賭博一次一百過買良為賤一百過助人為惡事大者加一百過無識毀經書一百過聽婦言疏親族一百過生事詐人財物一百過為人作一逆理詞狀五十過至五百過因而害人命者千過見寃可白不白五十過關係人名節倫常者倍之遇難可救不救五十過關係人家産性命者加之婢僕不教教者善言勸諭非打罵也五十過虐使僕婢五十過倚勢凌人五十過因公索詐五十過財多者加阻撓一善事五十過薦引一匪人五十過乘人急謀人什物五十過褻瀆三光五十過致一人杖刑五十過居官及家長枉杖一人五十過嫖妓及男淫一次五十過疑病妄藥五十過有子娶妾三十過雖未有子年未三十娶妾者三十過教人漁獵三十過毒藥殺魚三十過報怨太過三十過至百過謊騙財物三十過多者加縱婦女入廟燒香看戲三十過演淫戲一場二十過祭祀愆期二十過人雖有罪杖之過多過重者二十過私宰牛犬二十過賭博一次二十過窺探良家子女二十過侵蝕國課二十過多者加富者加為人處事受賄二十過匿遺二十過與不良者交一人一日十過逸樂恣縱一日十過盛氣凌人十過拆人家信一封十過力優吝施一事五過重利放債一兩五過多者照數加算留盼男女五過輕侮寒微五過負人一約五過事大者加棄字紙一片五過汚穢者加毀傷人器物一過貴重者加棄五穀暴天物一次五過殺一牲口五過無故特殺者加見人私取人物特往撞破五過借人器物不還五過諂富驕貧五過見人不為禮五過面是背非五過瞞衆受利五過多者加博名邀譽五過雖非邪淫而夫妻縱欲五過飲酒至醉一過與不良人同伴一次一過男女混雜無別三過索債過急三過至三百過致人賣男女賣物者加算殺禽魚昆蟲一命三過虛閒廢學一日三過享用過豐一日一過貧者加為人教子弟不盡心一日一事三過至三十過以不淨手翻書三過以書籍字扇置枕席間三過卧看經書一過用假銀一分三過占一小便宜一過拘繫禽獸一日一過致死一命者加專信神佛不孝敬父兄伯叔一日三十過為人作事不盡心十過事大者加借用他人器物不愛惜十過因而毀壞者加耽攔人家信五過誤人事者加便溺洗澡不避三光三過僧道巫祝術土謊騙人財百錢一過致人骨月參商千過竊聽人私語三過因而告人者加明陶石簣望齡功過論附或曰為善去惡在心耳奚必是曰子讀書耳奚必課程賞罰耳奚必律令出納耳奚必會計哉不知會計當則盈縮可稽律令明則趨避不惑課程立則作止有度否則勤惰任心高下任手有餘不足無從參考徒曰我為善我去惡曾為幾善去幾惡耶曰其如明功隱過何曰子勿慮也世有明功隱過於人者未有明功隱過於神者也我日為之夜書而藏之焚香染翰幽獨無侣四顧森然鬼神滿目以心蒞手一點一畫罔敢不誠而明功隱過乎哉曰我今日書而功微明日書而過巨不將怖而止乎曰勿怖也何以知功微而過巨書之而後功與過出焉微積而巨巨釋而微道不遠矣久久不輟自有得也曰我功巨而過微矣天道果有知耶曰子但飯無憂不飽也孔子曰故大德必得其位必得其祿必得其名必得其夀子所求在數者外則吾不敢知止此耳則坐而俟之
