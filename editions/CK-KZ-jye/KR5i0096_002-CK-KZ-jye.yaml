body:
  text: 警世功過格功過格後跋嘗稽無上内秘眞藏經特顯戒行爲一品我元始大天尊曰一切衆生貪著有爲不持戒行假使長夀猶如老樹有何殊別若持戒行直心行道今日亦善今月亦善今時亦善善善積德諸行備足善念護持令入法寶此煌煌寶訓宏範諸天我孚佑上帝秉玉清大化度億萬衆生總以戒爲心印開千七百餘壇而七覺上乘總以戒爲心法佛曰戒爲無上菩提本聖曰君子有三戒三教聖人皆使人由戒入道也兹冊合二功過格爲戒典包羅貫澈備極周詳因思我孚佑上帝又曾傳修眞七戒爲天仙家熏修至寶宜補載於此以公之同善爰澂心盥手跪述曰一戒機機者所由發動之玄竅也機動必發發必有所著著於惡屬死機固爲地獄種子著於善屬生機生者死之根是亦地獄種子故曰眞機無機有機失機貴乎忘機二戒濁濁者五陰七濁之障也惟淫惡爲最世人從濁處來上智以下皆不知有清濁如泥水置破缸中日逐攪動且從漏處滲去清水祗存一味濁腳故人惟知有濁不知有清雖知有清至此亦不可澄澄之亦不能清矣故於臨死之時身中痛苦萬狀性靈昏亂顚倒不知去來止於一點愛根復投愛慾中去如黑夜飛蛾望火投滅雖滅火中不知火之滅我也皆由濁故耳三戒躁心本虛明閒逸有事以實之則昏亂而發躁矣躁則有碍平等心有損太和氣自暴自棄皆本於此四戒辯分別一切種種爲心辯曉曉多言爲口辯心辯傷神神傷而精氣耗散口辯傷氣氣傷而精神動搖矣五戒昏靈明常覺眞體也氣禀拘之物慾誘之則積習久而障蔽深靈明眞體不能透露如鏡埋塵如水混土醉生夢死轉轉輪迴轉轉不覺皆由昏故六戒神役形形役神神者先天純陽靈明眞性也因父母念生氣合而成形而此神寓於其内及長而發爲知覺已雜後天之陰亦總謂之神也葢神以形爲旅舍形以神爲主人主人富饒則旅舍華潤旅舍完固則主人安甯其實存亡相係者也然此神變化不測無風起波隨波生浪致令百體動筋骨勞臟腑搖動氣血沸騰形漸凋斃此神役形之害也形斃而神亦失所依而去矣形雖四大假合而實從愛慾中來身體欲安過求所以安衣食欲美過求所以美越越受用則轉轉貪圖以至奔馳爵位以求榮身燒煉汞鉛以求服食抽添搬運以求永年令神不得少息日至散亡此形役神之害也神亡而形亦無主而傾矣故曰忘形以養神忘神以合虛七戒銳始怠終入道雖由頓悟成道實本積習人於一時悟得清淨法身本無染著從此悟後雖遇顚倒縱橫再不搖動此是上根利器世所希有恆河沙衆不知有始又何有終雖其間一二中才從塵沙中透出一點靈明眞性覺得本來無染發誓修持懺悔諸業掃除萬緣是爲銳始奈何愛河難渡苦海易沈或者富貴蕩淫或者貧賤困逼不免迷惑念頭弛懈縱有勤修之士一時無騐輒生怠心豈知純陽之體一毫陰氣未盡不能成眞必於幾十年間立志精修身居濁世神超太清一切種種喜怒哀樂之事絲毫不得侵染始初矜持勉强積至純粹自然至此方得完全去來自在與道合眞若或作或輟如不聞道若持久有漏取害愈大犯罪愈深若或始聞正道後入邪法此等罪愆永墮惡劫學者宜愼之嗟乎一點靈根𨚫被萬緣揉破百年假體都從六慾消磨上士利根何須設戒中人夙習可勿提撕吾嘗立戒於千秋彰彰寶筏願以廣度乎萬姓的的金針任伊求徧神仙訣敢不向此中尋縱然煉得汞丹成也須從這裏過云云至哉言乎慈哉心乎是三洞眞文秘諦是七返天仙金丹一字一牟尼珍珠蒼胡頡寶以是照諸四天下如日麗晴空矣惟願世人廣爲流通以宜道戒而洪善化庶不負普濟慈心云爾惠覺弟子蔣予蒲謹誌功過格後跋楞嚴經三無漏學由戒生定由定生慧此嚴淨毘尼宏範三界者也佛經有云人能受無上戒必至無上地道門有三洞衆戒初眞十戒昇玄内教百二十九戒洞玄三品百八十戒上清三百觀身戒洞神七百二十戒乃至律文千二百威儀戒更有碧玉眞宮大戒類皆斷除淫殺盜妄等以爲成眞證聖之梯航古未有弛然不自檢朿而能眞入心性之域者我孚佑上帝位證圓通文尼眞佛本與觀音大士同一願力同一慈化昔傳有說戒法言昭如日月今合二功過格又益以修眞七戒爲道門戒典義理廣大條目精詳人果能誠心向善䖍奉一編於座右朝夕展讀怵於目而警於心省之身而踐之行日自砥礪由勉期安漸至有功無過則存心養性在是明心見性在是修心煉性亦在是矣小子通仁承校是編爰敬跋數語於後云通仁弟子賞鍇敬跋
